<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>🧶 Braid: Visual Data & RTS Demo</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --red: #ff4d4d;
            --green: #00e676;
            --blue: #2979ff;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
        }

        h1 {
            margin: 0 0 20px 0;
            font-weight: 300;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 80vh;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-header {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-body {
            flex: 1;
            position: relative;
            padding: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .legend {
            font-size: 12px;
            display: flex;
            gap: 15px;
        }

        .dot {
            width: 10px;
            height: 10px;
            display: inline-block;
            border-radius: 50%;
            margin-right: 5px;
        }

        .dot.red {
            background: var(--red);
        }

        .dot.green {
            background: var(--green);
        }

        .stat-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 4px;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <h1>🧶 Braid Visualizer: Paradox & Synchronization</h1>

    <div class="grid">
        <div class="card">
            <div class="card-header">
                <span>📉 <strong>Analytics Paradox</strong>: Conversion Rate</span>
                <div class="legend">
                    <span><span class="dot red"></span>Naive Async (Bad)</span>
                    <span><span class="dot green"></span>Braid Synced (Good)</span>
                </div>
            </div>
            <div class="card-body">
                <canvas id="chartCanvas"></canvas>
                <div class="stat-overlay" id="chartStats">Initializing...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span>🎮 <strong>RTS Netcode</strong>: Latency Compensation</span>
                <div class="legend">
                    <span><span class="dot red"></span>Desync</span>
                    <span><span class="dot green"></span>Lockstep</span>
                </div>
            </div>
            <div class="card-body">
                <canvas id="gameCanvas"></canvas>
                <div class="stat-overlay" id="gameStats">P1: 50ms | P2: 400ms (Lag)</div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. BRAID LIBRARY (Minified Core)
        // ==========================================
        const Tension = { Tight: 'Tight', Loose: 'Loose' };
        class Fiber {
            constructor(gen) { this.gen = typeof gen === 'function' ? gen : () => gen; }
            spawn() { return this.gen(); }
        }
        class Braid {
            constructor(fibers, opts = {}) { this.fibers = fibers; this.tension = opts.tension || Tension.Tight; }
            async *[Symbol.asyncIterator]() {
                const S = this.fibers.map(f => ({ g: f.spawn(), v: undefined, done: false }));
                // TIGHT WEAVE (Lockstep)
                if (this.tension === Tension.Tight) {
                    while (true) {
                        const rs = await Promise.all(S.map(s => s.g.next()));
                        if (rs.some(r => r.done)) break;
                        yield rs.map((r, i) => S[i].v = r.value);
                    }
                }
                // LOOSE WEAVE (Race) - Simplified for demo
                else {
                    const P = new Map(S.map((s, i) => [i, s.g.next().then(r => ({ r, i }))]));
                    // Seed initial values
                    while (P.size > 0) {
                        const { r, i } = await Promise.race(P.values());
                        P.delete(i);
                        if (!r.done) {
                            S[i].v = r.value;
                            P.set(i, S[i].g.next().then(n => ({ r: n, i })));
                            // Only yield if we have at least one value for everyone (warmup)
                            if (S.every(s => s.v !== undefined)) yield S.map(s => s.v);
                        }
                    }
                }
            }
        }

        // ==========================================
        // 2. CHART VISUALIZER (The Paradox)
        // ==========================================
        (function () {
            const canvas = document.getElementById('chartCanvas');
            const ctx = canvas.getContext('2d');
            const stats = document.getElementById('chartStats');
            let width, height;

            // Data Buffers
            const badLine = [];
            const goodLine = [];
            const MAX_POINTS = 100;

            function resize() {
                width = canvas.width = canvas.parentElement.offsetWidth;
                height = canvas.height = canvas.parentElement.offsetHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            function draw() {
                ctx.fillStyle = '#161b22';
                ctx.fillRect(0, 0, width, height);

                // Grid
                ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1;
                ctx.beginPath();
                for (let y = height; y > 0; y -= 50) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
                ctx.stroke();

                // Helper to draw line
                const plot = (data, color, offset) => {
                    if (data.length < 2) return;
                    ctx.strokeStyle = color; ctx.lineWidth = 3;
                    ctx.beginPath();
                    data.forEach((val, i) => {
                        const x = (i / MAX_POINTS) * width;
                        const y = height - (val * (height / 20)); // Scale: 0-20%
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    });
                    ctx.stroke();
                };

                plot(badLine, '#ff4d4d'); // Red
                plot(goodLine, '#00e676'); // Green

                requestAnimationFrame(draw);
            }
            draw();

            // --- SIMULATION ---
            // Scenario: Traffic is slow (1000ms), Conversions are fast (200ms).
            // Paradox: If traffic drops but we use cached OLD traffic, Rate = Conv / OldHighTraffic = False Low.

            const trafficFiber = () => new Fiber(async function* () {
                let t = 1000;
                while (true) {
                    yield t; // Steady traffic
                    await new Promise(r => setTimeout(r, 1000));
                    // Suddenly traffic drops (e.g. server outage), but latency makes it slow to report
                    t = t === 1000 ? 200 : 1000;
                }
            });

            const convFiber = () => new Fiber(async function* () {
                while (true) {
                    // Conversions happen steadily relative to ACTUAL traffic
                    // But the sensor reads them fast
                    yield 50;
                    await new Promise(r => setTimeout(r, 200));
                }
            });

            // BAD: Manual Async (Race Condition)
            (async () => {
                let lastTraffic = 1000;
                const tf = trafficFiber().spawn();
                const cf = convFiber().spawn();

                // Background traffic updater
                (async () => { for await (const t of tf) lastTraffic = t; })();

                // Main loop on conversions
                for await (const c of cf) {
                    // BUG: We calculate rate using 'c' (current) and 'lastTraffic' (potentially old)
                    // If traffic dropped to 200, but we still think it's 1000, Rate = 50/1000 = 5% (Wrong)
                    // If traffic is 200, Rate should be 50/200 = 25%.
                    const rate = (c / lastTraffic) * 100;
                    badLine.push(rate);
                    if (badLine.length > MAX_POINTS) badLine.shift();
                }
            })();

            // GOOD: Braid (Tight Sync)
            (async () => {
                const braid = new Braid([trafficFiber(), convFiber()], { tension: Tension.Tight });
                for await (const [t, c] of braid) {
                    // Braid waits. We only calculate when we have a MATCHING traffic and conversion report.
                    // Rate is always correct.
                    const rate = (c / t) * 100;
                    goodLine.push(rate);
                    if (goodLine.length > MAX_POINTS) goodLine.shift();

                    stats.innerHTML = `
                <span style="color:#ff4d4d">Bad Sync: ${(badLine[badLine.length - 1] || 0).toFixed(1)}%</span><br>
                <span style="color:#00e676">Braid: ${(goodLine[goodLine.length - 1] || 0).toFixed(1)}%</span>
            `;
                }
            })();
        })();

        // ==========================================
        // 3. RTS GAME VISUALIZER
        // ==========================================
        (function () {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;

            // State
            let badP1 = { x: 10, y: 50 }, badP2 = { x: 10, y: 150 };
            let goodP1 = { x: 10, y: 50 }, goodP2 = { x: 10, y: 150 };

            function resize() {
                width = canvas.width = canvas.parentElement.offsetWidth;
                height = canvas.height = canvas.parentElement.offsetHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            function drawGame() {
                ctx.fillStyle = '#161b22';
                ctx.fillRect(0, 0, width, height);

                // Split Screen Line
                ctx.strokeStyle = '#30363d'; ctx.beginPath(); ctx.moveTo(width / 2, 0); ctx.lineTo(width / 2, height); ctx.stroke();

                // Labels
                ctx.fillStyle = '#ff4d4d'; ctx.fillText("DESYNC (Native)", 20, 30);
                ctx.fillStyle = '#00e676'; ctx.fillText("BRAID (Tight Tension)", width / 2 + 20, 30);

                // Draw Units
                const drawUnit = (x, y, color, label) => {
                    ctx.fillStyle = color;
                    ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = "10px monospace"; ctx.fillText(label, x - 5, y + 20);
                };

                // BAD SIDE (Left)
                drawUnit(badP1.x, badP1.y, '#2979ff', 'P1(Fast)');
                drawUnit(badP2.x, badP2.y, '#ff4d4d', 'P2(Lag)');

                // GOOD SIDE (Right)
                // Offset X by width/2
                drawUnit(goodP1.x + width / 2, goodP1.y, '#2979ff', 'P1');
                drawUnit(goodP2.x + width / 2, goodP2.y, '#00e676', 'P2');

                // Loop the visual if they go off screen
                if (badP1.x > width / 2) badP1.x = 0;
                if (badP2.x > width / 2) badP2.x = 0;
                if (goodP1.x > width / 2) { goodP1.x = 0; goodP2.x = 0; }

                requestAnimationFrame(drawGame);
            }
            drawGame();

            // --- SIMULATION ---

            // Player 1: Fast Connection (50ms)
            const p1Input = () => new Fiber(async function* () {
                while (true) {
                    await new Promise(r => setTimeout(r, 16)); // ~60fps
                    yield 2; // Move 2 pixels
                }
            });

            // Player 2: Laggy Connection (Random spikes)
            const p2Input = () => new Fiber(async function* () {
                while (true) {
                    // Lag simulation: random delay between 100ms and 400ms
                    await new Promise(r => setTimeout(r, Math.random() * 300 + 100));
                    yield 2; // Move 2 pixels
                }
            });

            // BAD: Independent handling
            (async () => {
                const i1 = p1Input().spawn();
                const i2 = p2Input().spawn();
                // P1 runs fast
                (async () => { for await (const dx of i1) badP1.x += dx; })();
                // P2 runs slow/jittery
                (async () => { for await (const dx of i2) badP2.x += dx; })();
            })();

            // GOOD: Braid Lockstep
            (async () => {
                const braid = new Braid([p1Input(), p2Input()], { tension: Tension.Tight });
                for await (const [dx1, dx2] of braid) {
                    // The loom waits for the SLOWEST connection
                    // Result: Smooth, synchronized movement. No "rubber banding".
                    goodP1.x += dx1;
                    goodP2.x += dx2;
                }
            })();

        })();
    </script>
</body>

</html>
